<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>識愛 · Practice of Loving — 抽卡</title>
<style>
  :root{
    --paper:#f3efe6;
    --paper-2:#ece6d8;
    --ink:#2c2a26;
    --ink-soft:#6b675e;
    --line:#cdc6b6;
    --accent:#b7553f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Serif TC","Songti TC",Georgia,"Times New Roman",serif;
    color:var(--ink);
    background:
      radial-gradient(120% 90% at 50% -10%, #faf7f0 0%, var(--paper) 45%, var(--paper-2) 100%);
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:max(24px,env(safe-area-inset-top)) 18px max(28px,env(safe-area-inset-bottom));
    -webkit-tap-highlight-color:transparent;
  }
  /* paper grain */
  body::before{
    content:"";
    position:fixed;inset:0;pointer-events:none;z-index:0;
    opacity:.05;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  header{position:relative;z-index:1;text-align:center;margin-bottom:20px;}
  .kicker{
    font-size:11px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--ink-soft);font-family:Georgia,serif;
    padding-left:.42em;
  }
  h1{
    font-size:clamp(28px,7vw,40px);font-weight:600;letter-spacing:.12em;
    margin:6px 0 4px;
  }
  .sub{font-size:13px;color:var(--ink-soft);letter-spacing:.04em;}

  .stage{
    position:relative;z-index:1;
    width:min(86vw,360px);
    aspect-ratio:9/16;
    perspective:1600px;
    margin:8px 0 4px;
    cursor:pointer;
    -webkit-user-select:none;user-select:none;
  }
  .card{
    position:absolute;inset:0;
    transform-style:preserve-3d;
    transition:transform .8s cubic-bezier(.2,.9,.25,1);
    border-radius:16px;
  }
  .stage.flipped .card{transform:rotateY(180deg);}

  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:16px;overflow:hidden;
    box-shadow:
      0 1px 0 rgba(255,255,255,.6) inset,
      0 18px 40px -18px rgba(60,50,30,.5),
      0 4px 12px -6px rgba(60,50,30,.35);
    background:#fbf8f1;
  }

  /* ---- back face (deck cover) ---- */
  .back{
    border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;
    background:
      repeating-linear-gradient(45deg, rgba(183,85,63,.04) 0 2px, transparent 2px 12px),
      linear-gradient(160deg,#fbf8f1,#efe8d8);
  }
  .back .frame{
    position:absolute;inset:14px;border:1px solid var(--line);border-radius:10px;
  }
  .back .frame::after{
    content:"";position:absolute;inset:5px;border:1px solid rgba(205,198,182,.6);border-radius:7px;
  }
  .back svg{width:46%;max-width:150px;color:var(--ink);}
  .back .title{font-size:24px;letter-spacing:.26em;padding-left:.26em;}
  .back .en{font-family:Georgia,serif;font-size:10px;letter-spacing:.4em;color:var(--ink-soft);text-transform:uppercase;padding-left:.4em;}
  .hint{
    position:absolute;bottom:18px;left:0;right:0;text-align:center;
    font-size:12px;letter-spacing:.2em;color:var(--ink-soft);
    animation:breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.35}50%{opacity:.9}}

  /* ---- front face (card image) ---- */
  .front{transform:rotateY(180deg);background:#fff;}
  .front img{width:100%;height:100%;object-fit:cover;display:block;}

  /* idle float + draw nudge */
  .stage.idle .card{animation:float 5s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .stage.dealing .card{animation:deal .5s ease;}
  @keyframes deal{0%{transform:translateY(0) rotateZ(0)}30%{transform:translateY(-14px) rotateZ(-2deg)}100%{transform:translateY(0)}}

  .controls{position:relative;z-index:1;display:flex;gap:12px;align-items:center;margin-top:18px;flex-wrap:wrap;justify-content:center;}
  button{
    font-family:inherit;font-size:15px;letter-spacing:.14em;
    color:var(--ink);background:transparent;
    border:1px solid var(--ink);border-radius:999px;
    padding:11px 26px;cursor:pointer;
    transition:all .25s ease;
  }
  button:hover{background:var(--ink);color:var(--paper);}
  button:active{transform:translateY(1px);}
  button.ghost{border-color:var(--line);color:var(--ink-soft);font-size:13px;padding:9px 18px;}
  button.ghost:hover{background:var(--line);color:var(--ink);}

  .meta{position:relative;z-index:1;margin-top:14px;font-size:12px;letter-spacing:.18em;color:var(--ink-soft);min-height:1.2em;text-align:center;}
  .num{color:var(--accent);font-weight:600;}

  footer{position:relative;z-index:1;margin-top:auto;padding-top:22px;font-size:11px;letter-spacing:.16em;color:var(--ink-soft);opacity:.7;font-family:Georgia,serif;}
</style>
</head>
<body>
  <header>
    <div class="kicker">Practice of Loving</div>
    <h1>識 愛</h1>
    <div class="sub">靜下心，抽一張，與彼此聊聊</div>
  </header>

  <div class="stage idle" id="stage" role="button" aria-label="抽一張卡" tabindex="0">
    <div class="card" id="card">
      <div class="face back">
        <div class="frame"></div>
        <svg viewBox="0 0 100 130" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M50 124 V58"/>
          <path d="M50 58 C50 40 38 28 26 24"/>
          <path d="M50 58 C50 40 62 28 74 24"/>
          <path d="M50 60 C50 44 50 30 50 16"/>
          <path d="M50 58 C44 46 30 42 20 44"/>
          <path d="M50 58 C56 46 70 42 80 44"/>
          <ellipse cx="24" cy="22" rx="5" ry="9" transform="rotate(-32 24 22)"/>
          <ellipse cx="76" cy="22" rx="5" ry="9" transform="rotate(32 76 22)"/>
          <ellipse cx="50" cy="13" rx="5" ry="9"/>
          <ellipse cx="18" cy="44" rx="5" ry="9" transform="rotate(-70 18 44)"/>
          <ellipse cx="82" cy="44" rx="5" ry="9" transform="rotate(70 82 44)"/>
          <circle cx="50" cy="56" r="4"/>
          <path d="M50 92 q-10 4 -16 -2 M50 104 q11 4 17 -3"/>
        </svg>
        <div>
          <div class="title">識 愛</div>
        </div>
        <div class="en">Draw a card</div>
        <div class="hint" id="hint">點擊抽卡</div>
      </div>
      <div class="face front">
        <img id="cardImg" alt="識愛卡片" />
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="drawBtn">抽一張</button>
    <button id="shuffleBtn" class="ghost">重新洗牌</button>
  </div>
  <div class="meta" id="meta">整副牌 28 張 · 尚未抽出</div>

  <footer>識愛 · PRACTICE OF LOVING</footer>

<script>
(function(){
  var TOTAL = 28;
  var pad = function(n){ return (n<10?"0":"")+n; };
  var images = [];
  for(var i=1;i<=TOTAL;i++) images.push("cards/"+pad(i)+".png");

  // preload
  images.forEach(function(src){ var im=new Image(); im.src=src; });

  var stage=document.getElementById("stage");
  var card=document.getElementById("card");
  var cardImg=document.getElementById("cardImg");
  var meta=document.getElementById("meta");
  var hint=document.getElementById("hint");
  var drawBtn=document.getElementById("drawBtn");
  var shuffleBtn=document.getElementById("shuffleBtn");

  var deck=[];          // remaining indices (1..28)
  var drawn=0;          // how many drawn this round
  var current=null;     // currently shown number
  var busy=false;

  function shuffle(){
    deck=[];
    for(var i=1;i<=TOTAL;i++) deck.push(i);
    for(var j=deck.length-1;j>0;j--){
      var k=Math.floor(Math.random()*(j+1));
      var t=deck[j]; deck[j]=deck[k]; deck[k]=t;
    }
  }

  function reset(){
    shuffle(); drawn=0; current=null;
    stage.classList.remove("flipped");
    stage.classList.add("idle");
    drawBtn.textContent="抽一張";
    meta.innerHTML="整副牌 "+TOTAL+" 張 · 尚未抽出";
  }

  function draw(){
    if(busy) return;

    // already showing a card -> flip back first, then draw next
    if(stage.classList.contains("flipped")){
      busy=true;
      stage.classList.remove("flipped");
      setTimeout(function(){ busy=false; draw(); }, 450);
      return;
    }

    if(deck.length===0){
      meta.innerHTML="這副牌已抽完 28 張 · 點「重新洗牌」再來一輪";
      return;
    }

    busy=true;
    stage.classList.remove("idle");
    stage.classList.add("dealing");

    current=deck.pop();
    drawn++;
    cardImg.src="cards/"+pad(current)+".png";

    setTimeout(function(){
      stage.classList.remove("dealing");
      stage.classList.add("flipped");
      meta.innerHTML="第 <span class='num'>"+pad(current)+"</span> 張 · 本輪已抽 "+drawn+" / "+TOTAL;
      drawBtn.textContent = deck.length>0 ? "再抽一張" : "已抽完 · 可洗牌";
      busy=false;
    }, 420);
  }

  stage.addEventListener("click", draw);
  stage.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); draw(); }});
  drawBtn.addEventListener("click", function(e){ e.stopPropagation(); draw(); });
  shuffleBtn.addEventListener("click", function(e){ e.stopPropagation(); reset(); });

  reset();
})();
</script>
</body>
</html>
