<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Practice of Loving — 抽卡</title>
<style>
  :root{
    --paper:#f9f6ef;
    --paper-2:#f2ede3;
    --ink:#2c2a26;
    --ink-soft:#6b675e;
    --line:#cdc6b6;
    --accent:#b7553f;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{
    font-family:"Noto Serif TC","Songti TC",Georgia,"Times New Roman",serif;
    color:var(--ink);
    background:radial-gradient(120% 90% at 50% -10%, #faf7f0 0%, var(--paper) 45%, var(--paper-2) 100%);
    -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;
  }

  /* ===== full-screen stage ===== */
  .stage{
    position:relative;
    width:100%;height:100vh;height:100dvh;
    perspective:2000px;
    cursor:pointer;
    z-index:1;
  }
  /* 第一屏底部往下滑提示 */
  .scrollcue{
    position:absolute;bottom:calc(16px + env(safe-area-inset-bottom));left:0;right:0;
    text-align:center;z-index:5;pointer-events:none;
    color:var(--ink-soft);font-size:11px;letter-spacing:.24em;
    animation:bob 1.9s ease-in-out infinite;
  }
  .scrollcue .chev{display:block;font-size:16px;margin-top:2px;opacity:.7;}
  @keyframes bob{0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(5px);opacity:.9}}
  .card{
    position:absolute;inset:0;
    transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.2,.9,.25,1);
  }
  .stage.flipped .card{transform:rotateY(180deg);}

  .face{
    position:absolute;inset:0;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    overflow:hidden;
    background:#f7f4ec;
  }

  /* ---- back face (deck cover, full screen) ---- */
  .back{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#fffefb,#faf6ee);
  }
  .back .frame{
    position:absolute;inset:18px;border:1px solid var(--line);border-radius:8px;
  }
  .back .frame::after{
    content:"";position:absolute;inset:6px;border:1px solid rgba(205,198,182,.55);border-radius:5px;
  }
  .back svg{width:min(42%,170px);color:var(--ink);}
  .back .cover-art{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:contain;mix-blend-mode:multiply;pointer-events:none;
  }
  .hint{
    position:absolute;bottom:calc(58px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;
    font-size:12px;letter-spacing:.22em;color:var(--ink-soft);
    animation:breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:.3}50%{opacity:.85}}

  /* ---- front face (card image, full-bleed with blurred fill) ---- */
  .front{transform:rotateY(180deg);display:flex;align-items:center;justify-content:center;}
  .front .bg{
    position:absolute;inset:0;
    background-size:cover;background-position:center;
    filter:blur(28px) saturate(1.05);
    transform:scale(1.25);
  }
  .front img{
    position:relative;z-index:1;display:block;
    max-width:100%;max-height:100%;width:auto;height:auto;
  }

  /* ===== intro splash ===== */
  .intro{
    position:fixed;inset:0;z-index:30;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;text-align:center;padding:24px;
    background:radial-gradient(120% 90% at 50% 40%, #faf7f0 0%, var(--paper) 55%, var(--paper-2) 100%);
    pointer-events:none;
    transition:opacity .9s ease;
  }
  .intro.hide{opacity:0;}
  .intro .kicker{
    font-size:11px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--ink-soft);font-family:Georgia,serif;padding-left:.42em;
    opacity:0;animation:fadeUp .9s ease .15s forwards;
  }
  .intro .intro-title{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;letter-spacing:.03em;
    font-size:clamp(22px,5.6vw,38px);max-width:90vw;line-height:1.2;
    opacity:0;animation:fadeUp .9s ease .3s forwards;
  }
  .intro .sub{
    font-size:14px;color:var(--ink-soft);letter-spacing:.03em;max-width:18em;line-height:1.6;
    opacity:0;animation:fadeUp .9s ease .5s forwards;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* ===== bottom controls (float over card) ===== */
  .controls{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;gap:16px;
    padding:54px 18px calc(54px + env(safe-area-inset-bottom));
    background:var(--paper-2);
    border-top:1px solid rgba(205,198,182,.5);
  }
  .meta{font-size:11px;letter-spacing:.06em;color:var(--ink-soft);min-height:1.1em;text-align:center;max-width:92vw;line-height:1.5;}
  .num{color:var(--accent);font-weight:600;}
  .btns{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;max-width:100%;}
  button{
    font-family:inherit;font-size:14px;letter-spacing:.08em;white-space:nowrap;
    color:var(--ink);
    background:rgba(255,255,255,.72);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    border:1px solid var(--ink);border-radius:999px;
    padding:10px 20px;cursor:pointer;
    transition:all .25s ease;
  }
  button:hover{background:var(--ink);color:var(--paper);}
  button:active{transform:translateY(1px);}
  button.ghost{border-color:var(--line);color:var(--ink-soft);font-size:12px;padding:9px 15px;}
  button.ghost:hover{background:var(--line);color:var(--ink);}
  button.icon{font-size:17px;line-height:1;padding:8px 14px;}
  button.disabled{opacity:.3;pointer-events:none;}
</style>
</head>
<body>

  <div class="intro" id="intro">
    <div class="kicker">A Deck for Two</div>
    <div class="intro-title">Practice of Loving</div>
    <div class="sub">Let’s just quiet our minds and connect.</div>
  </div>

  <div class="stage" id="stage" role="button" aria-label="抽一張卡" tabindex="0">
    <div class="card" id="card">
      <div class="face back">
        <img class="cover-art" src="cards/00.png" alt="" />
        <div class="frame"></div>
        <div class="hint" id="hint">點擊抽卡 · Tap to draw</div>
      </div>
      <div class="face front">
        <div class="bg" id="cardBg"></div>
        <img id="cardImg" alt="識愛卡片" />
      </div>
    </div>
    <div class="scrollcue">往下滑 · scroll<span class="chev">⌄</span></div>
  </div>

  <div class="controls" id="controls">
    <div class="meta" id="meta">整副牌 28 張 · 尚未抽出 · Deck of 28, not started</div>
    <div class="btns">
      <button id="backBtn" class="ghost icon" aria-label="回上一張 Back" title="回上一張 Back">↩&#xFE0E;</button>
      <button id="drawBtn">抽一張 · Draw</button>
      <button id="shuffleBtn" class="ghost">洗牌 · Shuffle</button>
    </div>
  </div>

<script>
(function(){
  var TOTAL = 28;
  var pad = function(n){ return (n<10?"0":"")+n; };
  var images = [];
  for(var i=1;i<=TOTAL;i++) images.push("cards/"+pad(i)+".png");
  images.forEach(function(src){ var im=new Image(); im.src=src; if(im.decode){ im.decode().catch(function(){}); } }); // 預載 + 先解碼

  var stage=document.getElementById("stage");
  var front=document.querySelector(".front");
  var cardImg=document.getElementById("cardImg");
  var cardBg=document.getElementById("cardBg");
  var meta=document.getElementById("meta");
  var drawBtn=document.getElementById("drawBtn");
  var backBtn=document.getElementById("backBtn");
  var shuffleBtn=document.getElementById("shuffleBtn");
  var intro=document.getElementById("intro");

  var deck=[];          // 未抽的牌（已洗）
  var hist=[];          // 本輪已抽出的牌（依序）
  var pos=-1;           // 目前顯示的是 hist 的哪一張（-1 = 還沒抽，顯示封面）
  var busy=false, introGone=false;

  function hideIntro(){
    if(introGone) return;
    introGone=true;
    intro.classList.add("hide");
  }
  // 進入時開場字出現一下，約 2.2 秒後自動淡出
  setTimeout(hideIntro, 2200);

  function shuffle(){
    deck=[];
    for(var i=1;i<=TOTAL;i++) deck.push(i);
    for(var j=deck.length-1;j>0;j--){
      var k=Math.floor(Math.random()*(j+1));
      var t=deck[j]; deck[j]=deck[k]; deck[k]=t;
    }
  }

  function setImage(n){
    var src="cards/"+pad(n)+".png";
    cardImg.src=src;
    cardBg.style.backgroundImage="url('"+src+"')";
  }

  function updateUI(){
    if(pos<0){
      meta.innerHTML="整副牌 "+TOTAL+" 張 · 尚未抽出 · Deck of "+TOTAL+", not started";
      drawBtn.textContent="抽一張 · Draw";
    } else {
      var n=hist[pos];
      meta.innerHTML="第 <span class='num'>"+pad(n)+"</span> 張 · 本輪已抽 "+hist.length+" / "+TOTAL+" · Card "+pad(n)+", "+hist.length+"/"+TOTAL+" drawn";
      drawBtn.textContent = (pos<hist.length-1) ? "下一張 · Next"
                          : (deck.length>0 ? "再抽一張 · Draw" : "已抽完 · Done");
    }
    backBtn.classList.toggle("disabled", pos<=0);  // 第一張或封面時，無法再往回
  }

  // 顯示第 n 張卡（保留翻牌動畫；確保換圖在「正面看不見」時、且新圖解碼後才翻回正面，避免閃到上一張）
  var FLIP=550; // 須與 CSS .card transition 時間一致
  function flipTo(n){
    busy=true;
    if(stage.classList.contains("flipped")){
      stage.classList.remove("flipped");           // 先翻回封面（此時正面背對使用者）
      setTimeout(function(){
        setImage(n); updateUI();                    // 在封面朝外、正面看不見時換圖
        revealFront();                              // 解碼完成後再翻出正面
      }, FLIP);
    } else {
      setImage(n); updateUI();
      revealFront();
    }
  }

  // 等新圖解碼好再翻到正面，杜絕翻回來時還停留在舊圖；加後備 timeout 防止任何情況卡死
  function revealFront(){
    var done=false;
    var go=function(){
      if(done) return; done=true;
      stage.classList.add("flipped");
      setTimeout(function(){ busy=false; }, FLIP);
    };
    if(cardImg.decode){ cardImg.decode().then(go).catch(go); }
    setTimeout(go, 500); // 後備：正常情況 decode 早已完成，這只在 decode 無回應時保命
  }

  function reset(){
    shuffle(); hist=[]; pos=-1;
    stage.classList.remove("flipped");
    updateUI();
  }

  // 下一張：若曾往回，先沿歷史前進；否則從牌堆抽新的一張
  function next(){
    if(busy) return;
    hideIntro();
    if(pos < hist.length-1){
      pos++;
      flipTo(hist[pos]);
    } else if(deck.length>0){
      var c=deck.pop(); hist.push(c); pos=hist.length-1;
      flipTo(c);
    } else {
      meta.innerHTML="這副牌已抽完 "+TOTAL+" 張 · 點「洗牌」再來一輪 · All "+TOTAL+" drawn — shuffle to restart";
    }
  }

  // 回上一張（不小心點到下一張時可以救回）
  function back(){
    if(busy || pos<=0) return;
    pos--;
    flipTo(hist[pos]);
  }

  stage.addEventListener("click", next);
  stage.addEventListener("keydown", function(e){
    if(e.key==="Enter"||e.key===" "||e.key==="ArrowRight"){ e.preventDefault(); next(); }
    else if(e.key==="ArrowLeft"||e.key==="Backspace"){ e.preventDefault(); back(); }
  });
  drawBtn.addEventListener("click", function(e){ e.stopPropagation(); next(); });
  backBtn.addEventListener("click", function(e){ e.stopPropagation(); back(); });
  shuffleBtn.addEventListener("click", function(e){ e.stopPropagation(); reset(); });

  reset();
})();
</script>
</body>
</html>
